---
- name: Download Vector RPM package
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-1.{{ vector_architecture }}.rpm"
    dest: "/tmp/vector-{{ vector_version }}-1.{{ vector_architecture }}.rpm"
    mode: '0644'
  register: vector_download

- name: Install Vector package
  become: true
  ansible.builtin.yum:
    name: "/tmp/vector-{{ vector_version }}-1.{{ vector_architecture }}.rpm"
    state: present
    disable_gpg_check: true
  notify: Restart vector service

- name: Deploy Vector configuration
  become: true
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_path }}"
    mode: '0644'
    validate: 'vector validate --config-yaml %s'
  notify: Restart vector service

- name: Ensure Vector service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: "{{ vector_service_name }}"
    state: started
    enabled: true
    daemon_reload: true