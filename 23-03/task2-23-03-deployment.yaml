apiVersion: apps/v1
kind: Deployment
metadata:
  name: task2-23-03-deployment
  labels:
    app: task2-23-03-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task2-23-03-app
  template:
    metadata:
      labels:
        app: task2-23-03-app
    spec:
      initContainers:
        - name: init-service-check
          image: busybox:latest
          command: ['sh', '-c', 'until nslookup task2-23-03-service.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for service; sleep 2; done']
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80