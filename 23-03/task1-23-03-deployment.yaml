apiVersion: apps/v1
kind: Deployment
metadata:
  name: task1-23-03-deployment
  labels:
    app: task1-23-03-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task1-23-03-app
  template:
    metadata:
      labels:
        app: task1-23-03-app
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
        - name: multitool
          image: wbitt/network-multitool:latest
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: HTTPS_PORT
              value: "8443"